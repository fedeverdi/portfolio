name: Deploy to Cloudflare

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  # ── 1. API Worker ────────────────────────────────────────────────────────────
  deploy-api:
    name: Deploy API Worker
    runs-on: ubuntu-latest
    environment: mein
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: api/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: api

      - name: Apply D1 migrations
        run: npm run db:migrate:prod
        working-directory: api
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}

      - name: Deploy Worker
        run: npm run deploy
        working-directory: api
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}

  # ── 2. Frontend (Nuxt static → Cloudflare Pages) ────────────────────────────
  deploy-frontend:
    name: Deploy Frontend
    runs-on: ubuntu-latest
    needs: deploy-api
    environment: mein
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Build
        run: npm run build
        working-directory: frontend
        env:
          NUXT_PUBLIC_API_BASE: https://api-portfolio.federicoverdi.it
          NUXT_PUBLIC_SITE_URL: https://portfolio.federicoverdi.it

      - name: Deploy to Cloudflare Pages
        run: npx wrangler@latest pages deploy dist --project-name=myportfolio-frontend
        working-directory: frontend
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}

  # ── 3. Backoffice (Vite static → Cloudflare Pages) ──────────────────────────
  deploy-backoffice:
    name: Deploy Backoffice
    runs-on: ubuntu-latest
    needs: deploy-api
    environment: mein
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: backoffice/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: backoffice

      - name: Build
        run: npm run build
        working-directory: backoffice
        env:
          VITE_API_BASE: https://api-portfolio.federicoverdi.it
          VITE_APP_URL: https://backoffice.federicoverdi.it

      - name: Deploy to Cloudflare Pages
        run: npx wrangler@latest pages deploy dist --project-name=myportfolio-backoffice
        working-directory: backoffice
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}

  # ── 4. Purge Cloudflare cache ────────────────────────────────────────────────
  purge-cache:
    name: Purge Cache
    runs-on: ubuntu-latest
    needs: [deploy-frontend, deploy-backoffice]
    environment: mein
    steps:
      - name: Purge frontend cache
        run: |
          RESPONSE=$(curl -s -X POST "https://api.cloudflare.com/client/v4/zones/${{ secrets.CF_ZONE_ID }}/purge_cache" \
            -H "Authorization: Bearer ${{ secrets.CF_PURGE_TOKEN }}" \
            -H "Content-Type: application/json" \
            --data '{"purge_everything":true}')
          echo "$RESPONSE"
          echo "$RESPONSE" | jq -e '.success == true' || (echo "Cache purge FAILED" && exit 1)
