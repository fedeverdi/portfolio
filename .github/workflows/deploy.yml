name: Deploy to Cloudflare

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  # ── 1. API Worker ────────────────────────────────────────────────────────────
  deploy-api:
    name: Deploy API Worker
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: api/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: api

      - name: Apply D1 migrations
        run: npm run db:migrate:prod
        working-directory: api
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}

      - name: Deploy Worker
        run: npm run deploy
        working-directory: api
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}

  # ── 2. Frontend (Nuxt static → Cloudflare Pages) ────────────────────────────
  deploy-frontend:
    name: Deploy Frontend
    runs-on: ubuntu-latest
    needs: deploy-api
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Generate static site
        run: npm run generate
        working-directory: frontend
        env:
          NUXT_PUBLIC_API_BASE: ${{ vars.API_WORKER_URL }}

      - name: Deploy to Cloudflare Pages
        run: npx wrangler@latest pages deploy .output/public --project-name=myportfolio-frontend
        working-directory: frontend
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}

  # ── 3. Backoffice (Vite static → Cloudflare Pages) ──────────────────────────
  deploy-backoffice:
    name: Deploy Backoffice
    runs-on: ubuntu-latest
    needs: deploy-api
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backoffice/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: backoffice

      - name: Build
        run: npm run build
        working-directory: backoffice
        env:
          VITE_API_BASE: ${{ vars.API_WORKER_URL }}

      - name: Deploy to Cloudflare Pages
        run: npx wrangler@latest pages deploy dist --project-name=myportfolio-backoffice
        working-directory: backoffice
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
